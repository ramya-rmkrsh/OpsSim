name: OpsSim CI Pipeline

on:
  push:

  pull_request:

jobs:

  build-and-test:

    runs-on: ubuntu-latest

    steps:

      # ----------------------------
      # 1. Checkout repository
      # ----------------------------
      - name: Checkout repository
        uses: actions/checkout@v4


      # ----------------------------
      # 2. Setup Docker Buildx
      # ----------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3


      # ----------------------------
      # 3. Build Docker containers
      # ----------------------------
      - name: Build services
        run: |
          docker compose build


      # ----------------------------
      # 4. Start full stack
      # ----------------------------
      - name: Start services
        run: |
          docker compose up -d


      # ----------------------------
      # 5. Wait for service-a readiness
      # ----------------------------
      - name: Wait for service-a
        run: |

          echo "Waiting for service-a startup..."

          for i in {1..30}; do

            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/health || true)

            echo "HTTP Status: $STATUS"

            if [ "$STATUS" = "200" ]; then

              echo "service-a is healthy"

              exit 0

            fi

            echo "service-a not ready yet..."

            sleep 5

          done

          echo "service-a failed to start"

          docker compose logs

          exit 1
      
      # ----------------------------
      # 6. Wait for full system readiness
      # ----------------------------
      - name: Wait for system readiness
        run: |

          echo "Waiting for system readiness..."

          for i in {1..30}; do

            RESPONSE=$(curl -s http://localhost:8080/system/status || true)

            READY=$(echo "$RESPONSE" | jq -r '.["service-b"].ready == true and .["service-c"].ready == true')

            echo "System ready: $READY"

            if [ "$READY" = "true" ]; then

              echo "All services are ready"

              exit 0

            fi

            echo "System not ready yet..."

            sleep 5

          done

          echo "System readiness failed"

          docker compose logs

          exit 1
      
      # ----------------------------
      # 7. Trigger workflow
      # ----------------------------
      - name: Trigger workflow
        id: trigger
        run: |

          RESPONSE=$(curl -s http://localhost:8080/work)

          echo "Response: $RESPONSE"

          TRACE_ID=$(echo $RESPONSE | jq -r '.trace_id')
          REQUEST_ID=$(echo $RESPONSE | jq -r '.request_id')

          echo "trace_id=$TRACE_ID" >> $GITHUB_OUTPUT
          echo "request_id=$REQUEST_ID" >> $GITHUB_OUTPUT

      # ----------------------------
      # 8. Wait for workflow completion
      # ----------------------------
      - name: Wait for workflow completion
        run: |

          REQUEST_ID="${{ steps.trigger.outputs.request_id }}"

          echo "Waiting for workflow completion..."

          for i in {1..30}; do

            STATUS=$(curl -s http://localhost:8080/status/$REQUEST_ID | jq -r '.status')

            echo "Current workflow status: $STATUS"

            if [[ "$STATUS" == "COMPLETED_C" || \
                  "$STATUS" == "FAILED_B" || \
                  "$STATUS" == "FAILED_C" || \
                  "$STATUS" == "ERRORED_C" ]]; then

              echo "Workflow reached terminal state"

              exit 0

            fi

            sleep 5

          done

          echo "Workflow timed out"

          docker compose logs

          exit 1
          
      # ----------------------------
      # 9. Validate workflow status
      # ----------------------------
      - name: Validate final workflow status
        run: |

          REQUEST_ID="${{ steps.trigger.outputs.request_id }}"

          STATUS=$(curl -s http://localhost:8080/status/$REQUEST_ID | jq -r '.status')

          echo "Final workflow status: $STATUS"

          if [[ "$STATUS" == "UNKNOWN" || \
                "$STATUS" == "PROCESSING_A" || \
                "$STATUS" == "PROCESSING_B" || \
                "$STATUS" == "PROCESSING_C" ]]; then

            echo "Workflow stuck or invalid"

            docker compose logs

            exit 1

          fi

          echo "Workflow reached terminal state successfully"


      # ----------------------------
      # 10. Print logs if failure
      # ----------------------------
      - name: Print container logs on failure
        if: failure()
        run: |
          docker compose logs


      # ----------------------------
      # 11. Shutdown containers
      # ----------------------------
      - name: Shutdown services
        if: always()
        run: |
          docker compose down -v