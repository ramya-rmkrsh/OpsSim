name: OpsSim CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # ----------------------------
      # 1. Checkout code
      # ----------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ----------------------------
      # 2. Set up Docker
      # ----------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ----------------------------
      # 3. Build containers
      # ----------------------------
      - name: Build services
        run: |
          docker compose build

      # ----------------------------
      # 4. Start full stack
      # ----------------------------
      - name: Start system
        run: |
          docker compose up -d

      # Wait for services to stabilize
      - name: Wait for system startup
        run: sleep 20

      # ----------------------------
      # 5. Trigger workflow
      # ----------------------------
      - name: Trigger workflow
        id: trigger
        run: |
          RESPONSE=$(curl -s http://localhost:8000/work)
          echo "Response: $RESPONSE"

          TRACE_ID=$(echo $RESPONSE | jq -r '.trace_id')
          REQUEST_ID=$(echo $RESPONSE | jq -r '.request_id')

          echo "trace_id=$TRACE_ID" >> $GITHUB_OUTPUT
          echo "request_id=$REQUEST_ID" >> $GITHUB_OUTPUT

      # ----------------------------
      # 6. Wait for processing
      # ----------------------------
      - name: Wait for workflow completion
        run: sleep 25

      # ----------------------------
      # 7. Validate final status (Redis-backed API)
      # ----------------------------
      - name: Check workflow status
        run: |
          REQUEST_ID="${{ steps.trigger.outputs.request_id }}"

          STATUS=$(curl -s http://localhost:8000/status/$REQUEST_ID | jq -r '.status')

          echo "Final status: $STATUS"

          if [[ "$STATUS" == "UNKNOWN" || "$STATUS" == "PROCESSING_A" || "$STATUS" == "PROCESSING_B" ]]; then
            echo "Workflow did not complete properly"
            exit 1
          fi

      # ----------------------------
      # 8. Show logs on failure (debugging)
      # ----------------------------
      - name: Print logs on failure
        if: failure()
        run: |
          docker compose logs service-a
          docker compose logs service-b
          docker compose logs service-c

      # ----------------------------
      # 9. Cleanup
      # ----------------------------
      - name: Shutdown system
        if: always()
        run: |
          docker compose down -v