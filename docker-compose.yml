
services:

  service-a:
    build: ./service-a
    ports:
      - "8001:8000"
    depends_on:
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  service-b:
    build: ./service-b
    ports:
      - "8002:8000"
    depends_on:
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
  
  service-c:
    build: ./service-c
    ports:
      - "8003:8000"
    depends_on:
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_started
      service-b:
        condition: service_started

  external-api:
    build: ./external-api
    ports:
      - "8004:8004"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - service-a
      - service-b

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  postgres:
    image: postgres:15

    environment:
      POSTGRES_DB: opssim
      POSTGRES_USER: opsuser
      POSTGRES_PASSWORD: opspassword

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
      
volumes:
  postgres_data: