
services:

  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      service-a:
        condition: service_healthy

  service-a:
    build: ./service-a
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"] # Instead of curl, using Python to avoid adding extra dependencies
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    depends_on:
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy

  service-b:
    build: ./service-b
    depends_on:
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
  
  service-c:
    build: ./service-c
    depends_on:
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      service-b:
        condition: service_started

  external-api:
    build: ./external-api
    ports:
      - "8004:8004"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: opssim
      POSTGRES_USER: opsuser
      POSTGRES_PASSWORD: opspassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opsuser -d opssim"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s 

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
      - tempo

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

  tempo:
    image: grafana/tempo:latest
    volumes:
      - ./tempo/tempo.yml:/etc/tempo/tempo.yml

  otel-collector:
    image: otel/opentelemetry-collector:latest
    volumes:
      - ./otel/otel-collector.yml:/etc/otel/config.yaml

  loki:
      image: grafana/loki:latest
      ports:
        - "3100:3100"
      volumes:
        - ./loki/loki-config.yml:/etc/loki/local-config.yaml
        - loki_data:/loki

  promtail:
    image: grafana/promtail:latest
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml
        
volumes:
  postgres_data:
  grafana_data: 
  loki_data: