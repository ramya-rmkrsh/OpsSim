auth_enabled: false

server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  trace_idle_period: 10s
  max_block_bytes: 52428800   # 50MB (more realistic than 1MB)
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 24h

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/blocks
    wal:
      path: /var/tempo/wal

query_frontend:
  search: {}  #Enabling this to be able to query traces in Grafana
  trace_by_id: {} #Enabling this to be able to query traces in Grafana

metrics_generator:
  registry:
    external_labels:
      source: tempo

  processor:
    service_graphs:
      wait: 10s
    span_metrics:
      dimensions:
        - service.name
        - span.name
        - status.code

  storage:
    path: /var/tempo/generator/wal

  # OPTIONAL but REQUIRED if you want metrics outside Tempo
  # remote_write:
  #   - url: http://prometheus:9090/api/v1/write